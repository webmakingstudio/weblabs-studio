<svg width="1200" height="360" viewBox="0 0 1200 360" fill="none" xmlns="http://www.w3.org/2000/svg">
  <title>WebMakingStudios Logo</title>
  <defs>
    <linearGradient id="markBg" x1="50" y1="44" x2="222" y2="228" gradientUnits="userSpaceOnUse">
      <stop stop-color="#D26A42"/>
      <stop offset="0.52" stop-color="#B55330"/>
      <stop offset="1" stop-color="#E0A05F"/>
    </linearGradient>
    <linearGradient id="markStroke" x1="70" y1="112" x2="196" y2="178" gradientUnits="userSpaceOnUse">
      <stop stop-color="#FFF8F0"/>
      <stop offset="1" stop-color="#F6D8B0"/>
    </linearGradient>
    <linearGradient id="tagline" x1="331" y1="276" x2="834" y2="276" gradientUnits="userSpaceOnUse">
      <stop stop-color="#8F3D1D"/>
      <stop offset="1" stop-color="#C96B43"/>
    </linearGradient>
    <filter id="cardShadow" x="18" y="12" width="254" height="258" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
      <feOffset dy="14"/>
      <feGaussianBlur stdDeviation="12"/>
      <feColorMatrix
        type="matrix"
        values="0 0 0 0 0.27451 0 0 0 0 0.105882 0 0 0 0 0.0470588 0 0 0 0.18 0"
      />
      <feBlend in2="SourceGraphic" result="shape"/>
    </filter>
  </defs>

  <rect width="1200" height="360" rx="48" fill="#FDF7EF"/>
  <rect x="1.5" y="1.5" width="1197" height="357" rx="46.5" stroke="#E9D8C8" stroke-width="3"/>

  <g filter="url(#cardShadow)">
    <rect x="42" y="36" width="206" height="206" rx="58" fill="url(#markBg)"/>
    <rect x="56" y="50" width="178" height="178" rx="46" fill="#FFF8F0" fill-opacity="0.08" stroke="#FFF8F0" stroke-opacity="0.24"/>
    <rect x="66" y="74" width="158" height="24" rx="12" fill="#FFF8F0" fill-opacity="0.16"/>
    <circle cx="84" cy="86" r="5.5" fill="#FFF8F0"/>
    <circle cx="103" cy="86" r="5.5" fill="#F5D4A9"/>
    <circle cx="122" cy="86" r="5.5" fill="#F2B07E"/>
    <path
      d="M72 182L97 112L130 181L159 133L188 194L221 96"
      stroke="url(#markStroke)"
      stroke-width="21"
      stroke-linecap="round"
      stroke-linejoin="round"
    />
    <circle cx="221" cy="96" r="10" fill="#FFF6EC"/>
    <circle cx="221" cy="96" r="4" fill="#D46F45"/>
    <rect x="72" y="202" width="70" height="11" rx="5.5" fill="#FFF8F0" fill-opacity="0.24"/>
    <rect x="150" y="202" width="43" height="11" rx="5.5" fill="#FFF8F0" fill-opacity="0.14"/>
  </g>

  <text
